<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArQa — Jewellery</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold:        #B8965A;
    --gold-light:  #D4AF7A;
    --gold-dim:    rgba(184,150,90,0.12);
    --gold-border: rgba(184,150,90,0.25);
    --black:       #0f0f0f;
    --off-black:   #1a1a1a;
    --gray:        #6b6b6b;
    --light-gray:  #f5f5f5;
    --white:       #ffffff;
    --grad:        linear-gradient(135deg, #B8965A 0%, #D4AF7A 100%);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
    font-weight: 300;
    letter-spacing: 0.01em;
    color: var(--black);
  }

  /* subtle gold glow — أخف بكتير من الأصل */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(184,150,90,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(184,150,90,0.07) 0%, transparent 60%);
    pointer-events: none;
  }

  /* ── CONTAINER ── */
  .container {
    background: var(--white);
    border-radius: 0;                        /* sharp corners */
    padding: 48px 36px;
    width: 100%;
    max-width: 420px;
    border: 1px solid #e8e8e8;
    box-shadow: 0 12px 48px rgba(0,0,0,0.07);
    position: relative;
    text-align: center;
  }

  /* ── LANG TOGGLE ── */
  .lang-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid #d0d0d0;
    border-radius: 0;                        /* sharp */
    padding: 5px 12px;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gray);
    cursor: pointer;
    transition: all 0.2s;
  }
  .lang-toggle:hover {
    border-color: var(--gold);
    color: var(--gold);
  }
  .lang-toggle span { font-size: 13px; }

  /* ── BRAND ── */
  .brand-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 64px;
    font-weight: 700;
    letter-spacing: 10px;
    text-transform: uppercase;
    color: var(--black);
    background: none;
    -webkit-text-fill-color: var(--black);
    margin-bottom: 4px;
    line-height: 1;
  }

  .brand-tagline {
    font-size: 9px;
    letter-spacing: 5px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 40px;
    font-weight: 400;
  }

  /* ── LINKS WRAPPER ── */
  .links-wrapper {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── BUTTONS ── */
  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 16px 24px;
    border-radius: 0;                        /* sharp corners */
    text-decoration: none;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    border: none;
    width: 100%;
  }

  .link-btn:hover { transform: translateY(-2px); }
  .link-btn:active { transform: scale(0.99); }

  /* Primary — black fill */
  .btn-primary {
    background: var(--black);
    color: var(--white);
    box-shadow: none;
  }
  .btn-primary:hover { background: var(--gold); }

  /* Outline */
  .btn-outline {
    background: var(--white);
    color: var(--black);
    border: 1px solid #d0d0d0;
    box-shadow: none;
  }
  .btn-outline:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  /* ── BUTTON ICON ── */
  .btn-icon {
    width: 32px;
    height: 32px;
    border-radius: 0;                        /* sharp */
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .btn-icon-bg      { background: rgba(184,150,90,0.12); }
  .btn-icon-outline { background: var(--light-gray); }

  .btn-label { flex: 1; text-align: center; }

  /* ── DIVIDER ── */
  .divider {
    height: 1px;
    background: linear-gradient(to right, transparent, #e8e8e8, transparent);
    margin: 4px 0;
  }

  /* ── FOOTER TEXT ── */
  .footer-text {
    margin-top: 32px;
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── RIPPLE ── */
  @keyframes ripple {
    0%   { transform: scale(0); opacity: 0.4; }
    100% { transform: scale(4); opacity: 0; }
  }
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(184,150,90,0.2);
    animation: ripple 0.6s linear;
    pointer-events: none;
    width: 20px;
    height: 20px;
    margin-top: -10px;
    margin-left: -10px;
  }

  /* ── LANGUAGE SWITCH ── */
  [lang-ar] .en-text { display: none; }
  [lang-ar] .ar-text { display: inline; }
  .ar-text { display: none; }
</style>
</head>
<body>
<div class="container" id="mainCard">

  <button class="lang-toggle" onclick="toggleLang()">
    <span>🌐</span>
    <span id="langLabel">العربية</span>
  </button>

  <div class="brand-logo">ArQa</div>
  <div class="brand-tagline">
    <span class="en-text">Jewellery</span>
    <span class="ar-text">إكسسوارات مختارة بعناية</span>
  </div>

  <div class="links-wrapper">

    <a href="shop.html" class="link-btn btn-primary" onclick="addRipple(event)">
      <div class="btn-label">
        <span class="en-text">Our Website</span>
        <span class="ar-text"> موقعنا</span>
      </div>
    </a>

    <a href="https://www.instagram.com/webgy_?igsh=ZHFqcWhmeWtzOWMy&utm_source=qr" target="_blank" class="link-btn btn-outline" onclick="addRipple(event)">
      <div class="btn-label">
        <span class="en-text">Our Instagram</span>
        <span class="ar-text">إنستجرام ArQa</span>
      </div>
    </a>

    <a href="https://www.tiktok.com/@webgy_?_r=1&_t=ZS-97Hf3dqQz5D" target="_blank" class="link-btn btn-outline" onclick="addRipple(event)">
      <div class="btn-label">
        <span class="en-text">Our TikTok</span>
        <span class="ar-text">تيك توك ArQa</span>
      </div>
    </a>

    <div class="divider"></div>

    <a href="returns.html" class="link-btn btn-outline" onclick="addRipple(event)" style="border-color:#ddd6fe; color:#7C3AED;">
      
      <div class="btn-label" style="color:#c08a5e;">
        <span class="en-text">Return & Exchange</span>
        <span class="ar-text">الاستبدال والاسترجاع</span>
      </div>
    </a>

  </div>

  <div class="footer-text">© 2026 ArQa · Developed by @engy_mostaffa  · webgy_</div>
</div>

<script>
let isArabic = false;

function toggleLang() {
  isArabic = !isArabic;
  const card = document.getElementById('mainCard');
  const label = document.getElementById('langLabel');
  if (isArabic) {
    card.setAttribute('lang-ar', '');
    document.documentElement.setAttribute('dir', 'rtl');
    label.textContent = 'English';
    document.title = 'ArQa — إكسسوارات';
  } else {
    card.removeAttribute('lang-ar');
    document.documentElement.removeAttribute('dir');
    label.textContent = 'العربية';
    document.title = 'ArQa — Accessories';
  }
}

function addRipple(e) {
  const btn = e.currentTarget;
  const ripple = document.createElement('span');
  ripple.classList.add('ripple');
  const rect = btn.getBoundingClientRect();
  ripple.style.left = (e.clientX - rect.left) + 'px';
  ripple.style.top = (e.clientY - rect.top) + 'px';
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 700);
}
</script>
</body>
</html>
